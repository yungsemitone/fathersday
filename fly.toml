# fly.toml app configuration file generated for dad-dashboard on 2026-06-20T13:46:36-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dad-dashboard'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  # Backend API (Fly) that holds Dad's watchlists — drives the Markets tab.
  STOCK_API_BASE = 'https://stockdashboard.fly.dev'
  # The full dashboard UI (Vercel frontend) the Markets button opens.
  STOCK_DASHBOARD_URL = 'https://stockdashboard-ochre.vercel.app'
  # The Economic Calendar app the Markets tab also links to.
  ECON_CALENDAR_URL = 'https://economic-calendar.fly.dev'
  # Persisted wine score cache lives here (the mounted volume below) so critic
  # scores survive deploys and aren't re-bought from Scrapfly each time.
  DATA_DIR = '/var/data'
  SCRAPER_PROVIDER = 'brightdata'
  # Bright Data Web Unlocker creds are set as secrets, NOT here:
  #   fly secrets set BRIGHTDATA_API_TOKEN=... BRIGHTDATA_ZONE=...

[mounts]
  source = 'data'
  destination = '/var/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
