# fly.toml app configuration file generated for dad-dashboard on 2026-06-20T13:46:36-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dad-dashboard'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile'

[env]
  # Backend API (Fly) that holds Dad's watchlists — drives the Markets tab.
  STOCK_API_BASE = 'https://stockdashboard.fly.dev'
  # The full dashboard UI (Vercel frontend) the Markets button opens.
  STOCK_DASHBOARD_URL = 'https://stockdashboard-ochre.vercel.app'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  memory_mb = 512
