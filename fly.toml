# Fly.io config for The Morning Desk (FastAPI serving API + frontend).
# Deploy from this directory:  fly deploy
# Full first-time steps are in DEPLOY.md.
#
# IMPORTANT: pick a globally-unique app name before first launch
# (or let `fly launch` set it for you).

app = "dad-dashboard" # must be globally unique across all of Fly -> becomes dad-dashboard.fly.dev
primary_region = "lax" # close to Los Angeles; see https://fly.io/docs/reference/regions/

[build]
  dockerfile = "Dockerfile"

[env]
  # Where Dad's Stock Scraper API lives. Set this to the deployed backend URL
  # (https://...). It's not a secret, so it can live here — or set it with
  #   fly secrets set STOCK_API_BASE=https://your-stock-app.fly.dev
  # If left unset/unreachable, the Markets tab shows sample data.
  STOCK_API_BASE = "https://CHANGE-ME-stock-backend.fly.dev"

[http_service]
  internal_port = 8000
  force_https = true
  # Always-on: keep one machine running 24/7 so it's instant every morning.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb" # light: no pandas/numpy, just httpx + feedparser
